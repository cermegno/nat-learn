llms:
  ollama_llm:
    _type: openai
    model: gemma4:e4b
    base_url: http://localhost:11434/v1
    api_key: ollama # dummy string
    #temperature: 0.7
    #max_tokens: 2048

workflow:
  type: chat_completion 
  llm_name: ollama_llm
  system_prompt: "You are a helpful assistant."

eval:
  general:
    output:
      dir: ./eval_results/
    dataset:
      _type: json
      file_path: eval_dataset.json
  evaluators:
    answer_accuracy:
      _type: langsmith_judge
      prompt: correctness
      llm_name: ollama_llm
      #choices: [0, 1]
      continuous: True
      num_retries: 3

