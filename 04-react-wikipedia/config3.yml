llms:
  ollama_llm:
    _type: openai
    model: gemma4:e4b
    base_url: http://localhost:11434/v1
    api_key: ollama # dummy string
    #temperature: 0.7
    #max_tokens: 2048

functions:
  wikipedia_search:
    _type: wiki_search
    max_results: 2

workflow:
  _type: react_agent
  tool_names: [wikipedia_search]
  llm_name: ollama_llm
  verbose: true
  parse_agent_response_max_retries: 3 # Retry up to 3 times